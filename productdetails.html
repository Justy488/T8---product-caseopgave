<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/productdetails_general.css" />
    <link rel="stylesheet" href="css/productdetails_layout.css" />
    <link rel="stylesheet" href="css/productdetails_style.css" />
    <script src="js/productdetails.js" defer></script>
    <script src="JS/knapper.js" defer></script>
    <title>Document</title>
  </head>
  <body>
    <header class="mainNav">
      <div class="topRow">
        <a href="index.html" class="logo">
          <h1>Vinted Maison</h1>
        </a>
        <nav class="topNav">
          <a href="#">Search</a>
          <a href="#">Account</a>
          <a href="#">Basket</a>
        </nav>
      </div>
      <nav class="categoryNav">
        <a data-group="Clothes">Clothes</a>
        <a data-group="Accessories">Accessories</a>
        <a data-group="Beauty">Beauty</a>
      </nav>
    </header>
    <main id="productcontainer">
      <section class="product">
        <div class="productImages">
          <div class="mainImage">
            <button>&lt;</button>
            <img src="img/bag1.webp" alt="bag" />
            <button>&gt;</button>
          </div>

          <div class="thumbnails">
            <img src="img/bag1.webp" alt="" />
            <img src="img/bag2.webp" alt="" />
            <img src="img/bag3.webp" alt="" />
          </div>
        </div>

        <div class="productInfo">
          <h1>..</h1>
          <p>Brand:</p>

          <div class="sizes">
            <button>XS</button>
            <button>S</button>
            <button>M</button>
            <button>L</button>
            <button>XL</button>
          </div>

          <div class="quantity">
            <button>-</button>
            <span>1</span>
            <button>+</button>
          </div>

          <p class="price">Pris:</p>
          <p>In stock</p>

          <button class="addToCart">Læg i indkøbskurv</button>
        </div>
      </section>

      <section class="description">
        <h2>Beskrivelse</h2>
        <p></p>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
